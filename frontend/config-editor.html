<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OOPZ Overlay 配置编辑器</title>
    <link rel="stylesheet" href="/assets/config-editor.css" />
  </head>
  <body>
    <div class="editor">
      <header class="editor__header">
        <div>
          <h1>OOPZ Overlay 配置编辑器</h1>
          <p>调整左侧参数，右侧预览会实时更新。虚拟用户保存后写入 <code>config.json</code> 的 <code>mock.users</code>。</p>
        </div>
        <div class="editor__actions">
          <button type="button" id="reset-btn" class="btn btn--ghost">重置</button>
          <button type="button" id="save-btn" class="btn btn--primary">保存配置</button>
        </div>
      </header>

      <div class="editor__body">
        <aside class="panel panel--controls">
          <form id="config-form" class="config-form">
            <section class="form-section">
              <h2>布局</h2>
              <label class="field">
                <span>布局方向</span>
                <select name="layout" id="layout">
                  <option value="horizontal">横向 (horizontal)</option>
                  <option value="vertical">竖向 (vertical)</option>
                  <option value="grid">网格 (grid)</option>
                </select>
              </label>
              <label class="field field--range">
                <span>头像尺寸 <strong id="avatarSize-value"></strong></span>
                <input type="range" name="avatarSize" id="avatarSize" min="40" max="128" step="1" />
              </label>
            </section>

            <section class="form-section">
              <h2>显示效果</h2>
              <label class="field field--range">
                <span>暗色透明度 <strong id="dimOpacity-value"></strong></span>
                <input type="range" name="dimOpacity" id="dimOpacity" min="0" max="1" step="0.01" />
              </label>
              <label class="field field--range">
                <span>非活动灰度 <strong id="inactiveGrayscale-value"></strong></span>
                <input type="range" name="inactiveGrayscale" id="inactiveGrayscale" min="0" max="1" step="0.01" />
              </label>
              <label class="field field--range">
                <span>高亮缩放 <strong id="highlightScale-value"></strong></span>
                <input type="range" name="highlightScale" id="highlightScale" min="1" max="1.4" step="0.01" />
              </label>
            </section>

            <section class="form-section">
              <h2>文字</h2>
              <label class="field field--checkbox">
                <input type="checkbox" name="showDisplayNames" id="showDisplayNames" />
                <span>显示昵称</span>
              </label>
              <label class="field field--checkbox">
                <input type="checkbox" name="showIds" id="showIds" />
                <span>显示 ID</span>
              </label>
              <label class="field field--range">
                <span>昵称字号 <strong id="nameFontSize-value"></strong></span>
                <input type="range" name="nameFontSize" id="nameFontSize" min="10" max="32" step="1" />
              </label>
              <label class="field field--range">
                <span>ID 字号 <strong id="idFontSize-value"></strong></span>
                <input type="range" name="idFontSize" id="idFontSize" min="8" max="24" step="1" />
              </label>
              <label class="field field--checkbox">
                <input type="checkbox" name="nameEllipsis" id="nameEllipsis" />
                <span>昵称过长显示省略号</span>
              </label>
            </section>

            <section class="form-section">
              <h2>虚拟用户</h2>
              <p class="section-hint">添加或编辑用户，用于预览多成员场景。保存后同步写入 <code>mock.users</code>。</p>
              <div id="user-list" class="user-list"></div>
              <button type="button" id="add-user-btn" class="btn btn--ghost btn--block">+ 添加用户</button>
            </section>

            <section class="form-section">
              <h2>预览场景</h2>
              <label class="field">
                <span>正在说话的用户</span>
                <select name="speakingUser" id="speakingUser"></select>
              </label>
            </section>
          </form>
        </aside>

        <section class="panel panel--preview">
          <div class="preview-toolbar">
            <span>实时预览</span>
            <a href="/overlay" target="_blank" rel="noopener">在新标签页打开叠加层</a>
          </div>
          <div class="preview-frame">
            <iframe id="preview" title="Overlay preview" src="/overlay?preview=1"></iframe>
          </div>
        </section>
      </div>

      <footer class="editor__footer">
        <span id="status-text">正在加载配置…</span>
      </footer>
    </div>

    <script src="/assets/config-editor.js" type="module"></script>
  </body>
</html>
